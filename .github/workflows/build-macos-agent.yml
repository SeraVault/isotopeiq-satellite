name: Build macOS Agent

on:
  push:
    paths:
      - 'agents/macos_collector.py'
      - '.github/workflows/build-macos-agent.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Test collector output on the actual macOS runner ──────────────────────
  test:
    name: Test collector
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run collector + validate
        run: |
          python3 agents/macos_collector.py > /tmp/output.json 2>/tmp/errors.txt
          if [ $? -ne 0 ]; then
            echo "--- collector stderr ---"
            cat /tmp/errors.txt
            exit 1
          fi
          python3 .github/scripts/validate_collector.py /tmp/output.json

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-collector-output
          path: /tmp/output.json
          retention-days: 7

  # ── Build binary ───────────────────────────────────────────────────────────
  build:
    name: Build (universal2)
    needs: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          cd agents
          pyinstaller --onefile --name macos_collector macos_collector.py
          rm -f macos_collector
          mv dist/macos_collector .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-collector
          path: agents/macos_collector
          retention-days: 30

  commit-binary:
    name: Commit binary
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-collector
          path: agents/

      - name: Make binary executable
        run: chmod +x agents/macos_collector

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add agents/macos_collector
          git diff --cached --quiet && echo "No binary changes." || \
            git commit -m "chore: rebuild macos agent binary [skip ci]"
          git push
