name: Build Linux Agent

on:
  push:
    paths:
      - 'agents/linux_collector.py'
      - '.github/workflows/build-linux-agent.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Test collector output on representative distros ────────────────────────
  test:
    name: Test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:24.04
            setup: apt-get update -qq && apt-get install -y -qq python3
          - distro: rocky
            image: rockylinux:9
            setup: "true"
          - distro: alpine
            image: alpine:3.20
            setup: apk add --no-cache python3

    steps:
      - uses: actions/checkout@v4

      - name: Run collector + validate (${{ matrix.distro }})
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/agents:/work" \
            -w /work \
            "${{ matrix.image }}" \
            sh -exc '
              ${{ matrix.setup }}
              python3 linux_collector.py > /tmp/output.json 2>/tmp/errors.txt
              EXIT=$?
              if [ $EXIT -ne 0 ]; then
                cat /tmp/errors.txt
                exit 1
              fi
              python3 - <<PYEOF
import json, sys
with open("/tmp/output.json") as f:
    data = json.load(f)
errors = []
for key in ["device","hardware","os","network","users","groups","packages","services"]:
    if key not in data:
        errors.append("MISSING key: " + key)
for key in ["packages","services","users"]:
    if not data.get(key):
        errors.append("EMPTY array: " + key)
for k, v in {k: v for k, v in data.get("_collection_errors", {}).items()
             if k not in {"certificates","firewall_rules","sysctl","ssh_keys",
                          "security","pci_devices","storage_devices","usb_devices"}}.items():
    errors.append("COLLECTION ERROR in {}: {}".format(k, v))
print("packages={} services={} users={} os={} {}".format(
    len(data.get("packages",[])), len(data.get("services",[])),
    len(data.get("users",[])),
    data.get("os",{}).get("name",""), data.get("os",{}).get("version","")))
if errors:
    print("FAILURES: " + "; ".join(errors))
    sys.exit(1)
print("OK")
PYEOF
            '

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: collector-output-${{ matrix.distro }}
          path: /tmp/output.json
          retention-days: 7

  # ── 64-bit ─────────────────────────────────────────────────────────────────
  # centos:7 has glibc 2.17 natively — the binary runs on RHEL/CentOS 7+,
  # Ubuntu 14.04+, Debian 8+, and any other distro with glibc ≥ 2.17.
  build-amd64:
    name: Build (amd64)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build binary (amd64)
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -v "${{ github.workspace }}/agents:/work" \
            -w /work \
            centos:7 \
            bash -exc "
              sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*.repo
              sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo
              yum install -y epel-release
              yum install -y python36
              python3.6 -m ensurepip --upgrade
              pip3.6 install --upgrade pip wheel
              pip3.6 install 'pyinstaller<5'
              python3.6 -m PyInstaller --onefile --name linux_collector_amd64 linux_collector.py
              mv dist/linux_collector_amd64 .
            "

      - name: Upload artifact (amd64)
        uses: actions/upload-artifact@v4
        with:
          name: linux-collector-amd64
          path: agents/linux_collector_amd64
          retention-days: 30

  # ── 32-bit ─────────────────────────────────────────────────────────────────
  # i386/debian:buster is a public Docker Hub official image (Debian 10,
  # glibc 2.28, Python 3.7). Emulated via QEMU on the 64-bit runner.
  build-i686:
    name: Build (i686)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 386

      - name: Build binary (i686)
        run: |
          docker run --rm \
            --platform linux/386 \
            -v "${{ github.workspace }}/agents:/work" \
            -w /work \
            i386/debian:buster \
            bash -exc "
              # Buster is EOL — redirect to the archive mirror.
              echo 'deb http://archive.debian.org/debian buster main' > /etc/apt/sources.list
              echo 'deb http://archive.debian.org/debian-security buster/updates main' >> /etc/apt/sources.list
              apt-get update -qq
              apt-get install -y -qq python3 python3-pip
              pip3 install --quiet --upgrade pip wheel
              pip3 install --quiet 'pyinstaller<6'
              pyinstaller --onefile --name linux_collector_i686 linux_collector.py
              mv dist/linux_collector_i686 .
            "

      - name: Upload artifact (i686)
        uses: actions/upload-artifact@v4
        with:
          name: linux-collector-i686
          path: agents/linux_collector_i686
          retention-days: 30

  # ── Commit binaries back to repo ───────────────────────────────────────────
  commit-binaries:
    name: Commit binaries
    needs: [build-amd64, build-i686]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-collector-amd64
          path: agents/

      - name: Download i686 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-collector-i686
          path: agents/

      - name: Make binaries executable
        run: chmod +x agents/linux_collector_amd64 agents/linux_collector_i686

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/linux_collector_amd64 agents/linux_collector_i686
          git diff --cached --quiet && echo "No binary changes." || \
            git commit -m "chore: rebuild linux agent binaries [skip ci]" && git push
