name: Build Linux Agent

on:
  push:
    paths:
      - 'agents/linux_collector.py'
      - '.github/workflows/build-linux-agent.yml'
  workflow_dispatch:

jobs:
  # ── 64-bit ─────────────────────────────────────────────────────────────────
  # centos:7 has glibc 2.17 natively — the binary runs on RHEL/CentOS 7+,
  # Ubuntu 14.04+, Debian 8+, and any other distro with glibc ≥ 2.17.
  build-amd64:
    name: Build (amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build binary (amd64)
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -v "${{ github.workspace }}/agents:/work" \
            -w /work \
            centos:7 \
            bash -exc "
              yum install -y epel-release
              yum install -y python36
              python3.6 -m ensurepip --upgrade
              pip3.6 install 'pyinstaller<5'
              python3.6 -m PyInstaller --onefile --name linux_collector_amd64 linux_collector.py
              mv dist/linux_collector_amd64 .
            "

      - name: Upload artifact (amd64)
        uses: actions/upload-artifact@v4
        with:
          name: linux-collector-amd64
          path: agents/linux_collector_amd64
          retention-days: 30

  # ── 32-bit ─────────────────────────────────────────────────────────────────
  # i386/debian:buster is a public Docker Hub official image (Debian 10,
  # glibc 2.28, Python 3.7). Emulated via QEMU on the 64-bit runner.
  build-i686:
    name: Build (i686)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 386

      - name: Build binary (i686)
        run: |
          docker run --rm \
            --platform linux/386 \
            -v "${{ github.workspace }}/agents:/work" \
            -w /work \
            i386/debian:buster \
            bash -exc "
              apt-get update -qq
              apt-get install -y -qq python3 python3-pip
              pip3 install --quiet pyinstaller
              pyinstaller --onefile --name linux_collector_i686 linux_collector.py
              mv dist/linux_collector_i686 .
            "

      - name: Upload artifact (i686)
        uses: actions/upload-artifact@v4
        with:
          name: linux-collector-i686
          path: agents/linux_collector_i686
          retention-days: 30
