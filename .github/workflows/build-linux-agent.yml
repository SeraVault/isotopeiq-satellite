name: Build Linux Agent

on:
  push:
    paths:
      - 'agents/linux_collector.py'
      - '.github/workflows/build-linux-agent.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # 64-bit — glibc ≥ 2.17 (RHEL 7 / Ubuntu 14.04 / Debian 8 era)
          - suffix: amd64
            platform: linux/amd64
            image: ghcr.io/pypa/manylinux_2_17_x86_64
            qemu: false

          # 32-bit — same glibc 2.17 floor, i686 ABI (RHEL 7 32-bit, old hardware)
          - suffix: i686
            platform: linux/386
            image: ghcr.io/pypa/manylinux_2_17_i686
            qemu: true

    steps:
      - uses: actions/checkout@v4

      # Authenticate to ghcr.io using the built-in Actions token — no secrets needed.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (i686 only)
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 386

      # manylinux_2_17 images ship several CPython builds under /opt/python/.
      # cp311 is new enough for PyInstaller 6.x and produces a binary that
      # runs on any Linux with glibc ≥ 2.17 (RHEL 7+, Ubuntu 14.04+, Debian 8+).
      - name: Build binary (${{ matrix.suffix }})
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/agents:/work" \
            -w /work \
            ${{ matrix.image }} \
            bash -c "
              export PATH=/opt/python/cp311-cp311/bin:\$PATH
              pip install --quiet pyinstaller
              pyinstaller --onefile --name linux_collector_${{ matrix.suffix }} linux_collector.py
              mv dist/linux_collector_${{ matrix.suffix }} .
            "

      - name: Upload artifact (${{ matrix.suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: linux-collector-${{ matrix.suffix }}
          path: agents/linux_collector_${{ matrix.suffix }}
          retention-days: 30
