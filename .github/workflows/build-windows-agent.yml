name: Build Windows Agent

on:
  push:
    paths:
      - 'agents/windows_collector.py'
      - '.github/workflows/build-windows-agent.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Test collector output on the actual Windows runner ────────────────────
  test:
    name: Test collector
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Run collector + validate
        shell: pwsh
        run: |
          python agents\windows_collector.py > $env:TEMP\output.json 2> $env:TEMP\errors.txt
          if ($LASTEXITCODE -ne 0) {
            Get-Content $env:TEMP\errors.txt
            exit 1
          }
          python .github\scripts\validate_collector.py $env:TEMP\output.json

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-collector-output
          path: ${{ env.TEMP }}\output.json
          retention-days: 7

  # ── Build executable ───────────────────────────────────────────────────────
  build:
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up 32-bit Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: |
          cd agents
          pyinstaller --onefile --name windows_collector windows_collector.py
          if (Test-Path windows_collector.exe) { Remove-Item windows_collector.exe }
          move dist\windows_collector.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-collector
          path: agents/windows_collector.exe
          retention-days: 30

  commit-binary:
    name: Commit binary
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-collector
          path: agents/

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add agents/windows_collector.exe
          git diff --cached --quiet && echo "No binary changes." || \
            git commit -m "chore: rebuild windows agent binary [skip ci]"
          git push
