name: Build macOS Agent

on:
  push:
    paths:
      - 'agents/macos_collector.py'
      - '.github/workflows/build-macos-agent.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (universal2)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          cd agents
          pyinstaller --onefile --name macos_collector macos_collector.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-collector
          path: agents/dist/macos_collector
          retention-days: 30
