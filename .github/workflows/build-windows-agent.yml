name: Build Windows Agent

on:
  push:
    paths:
      - 'agents/windows_collector.py'
      - '.github/workflows/build-windows-agent.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up 32-bit Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: |
          cd agents
          pyinstaller --onefile --name windows_collector windows_collector.py
          move dist\windows_collector.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-collector
          path: agents/windows_collector.exe
          retention-days: 30

  commit-binary:
    name: Commit binary
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-collector
          path: agents/

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/windows_collector.exe
          git diff --cached --quiet && echo "No binary changes." || \
            git commit -m "chore: rebuild windows agent binary [skip ci]" && git push
