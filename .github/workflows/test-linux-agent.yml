name: Test Linux Agent

on:
  push:
    paths:
      - 'agents/linux_collector.py'
      - '.github/workflows/test-linux-agent.yml'
  pull_request:
    paths:
      - 'agents/linux_collector.py'
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # dpkg path
          - distro: Ubuntu 24.04
            image: ubuntu:24.04
            pkg_mgr: dpkg
            setup: apt-get update -qq && apt-get install -y -qq python3
          - distro: Debian Bookworm
            image: debian:bookworm
            pkg_mgr: dpkg
            setup: apt-get update -qq && apt-get install -y -qq python3
          # rpm path
          - distro: Rocky Linux 9
            image: rockylinux:9
            pkg_mgr: rpm
            setup: "true"   # python3 and rpm already present
          - distro: Fedora 42
            image: fedora:42
            pkg_mgr: rpm
            setup: dnf install -y python3 --quiet
          # apk path
          - distro: Alpine 3.20
            image: alpine:3.20
            pkg_mgr: apk
            setup: apk add --no-cache python3

    steps:
      - uses: actions/checkout@v4

      - name: Run collector + validate (${{ matrix.distro }})
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/agents:/work" \
            -v "${{ github.workspace }}/.github/scripts:/scripts" \
            -w /work \
            "${{ matrix.image }}" \
            sh -exc '
              ${{ matrix.setup }}
              python3 linux_collector.py > /tmp/output.json 2>/tmp/errors.txt
              EXIT=$?
              if [ $EXIT -ne 0 ]; then
                cat /tmp/errors.txt
                exit 1
              fi
              python3 /scripts/validate_collector.py /tmp/output.json
            '

      - name: Upload JSON output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: collector-output-${{ matrix.pkg_mgr }}
          path: /tmp/output.json
          retention-days: 7
