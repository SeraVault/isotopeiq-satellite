# ─────────────────────────────────────────────────────────────────────────────
# IsotopeIQ Satellite — Nginx Site Configuration
#
# Replace YOUR_SERVER_NAME with your server's IP address or domain name.
# For HTTPS, run: sudo certbot --nginx -d your.domain.com
# ─────────────────────────────────────────────────────────────────────────────

upstream isotopeiq_backend {
    server unix:/run/isotopeiq/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name YOUR_SERVER_NAME;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "strict-origin-when-cross-origin";

    # ── Request size ──────────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Django static files ───────────────────────────────────────────────────
    location /static/ {
        alias /opt/isotopeiq/backend/staticfiles/;
        expires 30d;
        access_log off;
    }

    # ── Backend API, admin, and auth routes ───────────────────────────────────
    location ~ ^/(api|admin|saml2)/ {
        proxy_pass         http://isotopeiq_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket (Django Channels / future use) ──────────────────────────────
    location /ws/ {
        proxy_pass         http://isotopeiq_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── Vue SPA (everything else) ─────────────────────────────────────────────
    location / {
        root  /opt/isotopeiq/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
